name: p

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the video'
        required: true
        type: string
      use_cookies:
        description: 'Use PH_COOKIES secret for age-restricted content'
        required: false
        type: boolean
        default: true
      output_folder:
        description: 'Folder where the video will be saved'
        required: false
        type: string
        default: 'downloads/media'
      quality:
        description: 'Video quality (yt-dlp format selector)'
        required: true
        type: string
        default: 'bestvideo[height<=720]+bestaudio/best[ext=mp4]/best'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          pip install -U yt-dlp
          sudo apt-get update -q
          sudo apt-get install -y bc p7zip-full

      - name: Download video
        id: download
        shell: bash
        # All ${{ }} expansions are moved to env: — never interpolated inside the script body.
        # This prevents script injection attacks via malicious input values.
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
          INPUT_FOLDER: ${{ github.event.inputs.output_folder }}
          INPUT_QUALITY: ${{ github.event.inputs.quality }}
          INPUT_USE_COOKIES: ${{ github.event.inputs.use_cookies }}
          PH_COOKIES: ${{ secrets.PH_COOKIES }}
        run: |
          # Basic URL validation — must start with http:// or https://
          if [[ ! "$INPUT_URL" =~ ^https?:// ]]; then
            echo "ERROR: Invalid URL"
            exit 1
          fi

          # Mask URL from all subsequent log output
          echo "::add-mask::$INPUT_URL"

          mkdir -p "$INPUT_FOLDER"
          touch marker

          COOKIE_ARG=""
          if [[ "$INPUT_USE_COOKIES" == "true" && -n "$PH_COOKIES" ]]; then
            printf '%s' "$PH_COOKIES" > /tmp/ph_cookies.txt
            COOKIE_ARG="--cookies /tmp/ph_cookies.txt"
          fi

          MAX_RETRIES=5
          RETRY_COUNT=0
          SUCCESS=false

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT+1))/$MAX_RETRIES"

            yt-dlp \
              --output "./$INPUT_FOLDER/%(uploader)s - %(title)s - %(id)s.%(ext)s" \
              --format "$INPUT_QUALITY" \
              --merge-output-format mp4 \
              --concurrent-fragments 4 \
              --retries 3 \
              --fragment-retries 10 \
              --no-check-certificate \
              --xff default \
              --no-color \
              --newline \
              $COOKIE_ARG \
              "$INPUT_URL" && {

                NEW_FILE=$(find "$INPUT_FOLDER" -type f -newer marker -print -quit)

                if [ -n "$NEW_FILE" ]; then
                  echo "Download succeeded: $NEW_FILE"
                  SUCCESS=true
                  break
                else
                  echo "No file detected, retrying..."
                fi
              } || echo "Attempt failed"

            RETRY_COUNT=$((RETRY_COUNT+1))
            [ $RETRY_COUNT -lt $MAX_RETRIES ] && sleep 5
          done

          # Securely wipe the cookie file regardless of outcome
          if [ -f /tmp/ph_cookies.txt ]; then
            shred -u /tmp/ph_cookies.txt
          fi

          if [ "$SUCCESS" = false ]; then
            echo "All attempts failed"
            exit 1
          fi

          echo "filepath=$NEW_FILE" >> $GITHUB_OUTPUT

      - name: Encrypt and obfuscate
        shell: bash
        # ENCRYPT_PASSWORD is passed as env var — never appears in the script body
        # or as a CLI argument visible in the process list (ps aux).
        env:
          ENCRYPT_PASS: ${{ secrets.ENCRYPT_PASSWORD }}
          INPUT_FOLDER: ${{ github.event.inputs.output_folder }}
          FILEPATH: ${{ steps.download.outputs.filepath }}
        run: |
          if [ -z "$ENCRYPT_PASS" ]; then
            echo "ERROR: ENCRYPT_PASSWORD secret is not set"
            exit 1
          fi

          RAND_NAME=$(openssl rand -hex 16)
          SIZE_MB=$(echo "scale=2; $(stat -c %s "$FILEPATH") / 1048576" | bc)
          ARCHIVE="$INPUT_FOLDER/${RAND_NAME}.7z"

          if (( $(echo "$SIZE_MB > 99" | bc -l) )); then
            7z a -p"$ENCRYPT_PASS" -mhe=on -mx=0 -v95m "$ARCHIVE" "$FILEPATH"
          else
            7z a -p"$ENCRYPT_PASS" -mhe=on -mx=0 "$ARCHIVE" "$FILEPATH"
          fi

          shred -u "$FILEPATH"
          echo "Encrypted files:"
          ls -lh "$INPUT_FOLDER/"

      - name: Commit and push
        shell: bash
        env:
          INPUT_FOLDER: ${{ github.event.inputs.output_folder }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$INPUT_FOLDER/"
          git commit -m "Update" || echo "Nothing to commit"
          git push
