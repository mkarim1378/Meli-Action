name: ذخیره صفحه به MHTML

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the webpage to download'
        required: true
        type: string
      title:
        description: 'Optional filename (no spaces or special chars)'
        required: false
        type: string
      use_cookies:
        description: 'Use MHTML_COOKIES secret (for pages requiring login)'
        required: false
        type: boolean
        default: false
      output_folder:
        description: 'Folder for saved files'
        required: false
        type: string
        default: 'downloads/mhtml'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          pip install -q playwright
          playwright install chromium --with-deps

      - name: Download page as MHTML
        id: download
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
          INPUT_TITLE: ${{ github.event.inputs.title }}
          INPUT_FOLDER: ${{ github.event.inputs.output_folder }}
          INPUT_USE_COOKIES: ${{ github.event.inputs.use_cookies }}
          MHTML_COOKIES: ${{ secrets.MHTML_COOKIES }}
        shell: bash
        run: |
          echo "::add-mask::$INPUT_URL"

          if [[ ! "$INPUT_URL" =~ ^https?:// ]]; then
            echo "ERROR: Invalid URL"
            exit 1
          fi

          # Determine filename
          if [ -n "$INPUT_TITLE" ]; then
            BASE_NAME="$INPUT_TITLE"
          else
            BASE_NAME=$(python3 -c "
from urllib.parse import urlparse
import re
p = urlparse('$INPUT_URL')
name = p.path.strip('/').replace('/','_') or p.netloc or 'webpage'
print(re.sub(r'[\\\\/*?:\"<>|]', '_', name)[:80])
")
          fi

          MHTML_PATH="/tmp/mhtml_work/${BASE_NAME}.mhtml"
          mkdir -p /tmp/mhtml_work

          # Cookie handling
          COOKIE_ARG=""
          if [[ "$INPUT_USE_COOKIES" == "true" && -n "$MHTML_COOKIES" ]]; then
            printf '%s' "$MHTML_COOKIES" > /tmp/mhtml_cookies.txt
            COOKIE_ARG="--cookies-file /tmp/mhtml_cookies.txt"
          fi

          python save_as_mhtml.py \
            --url "$INPUT_URL" \
            --output "$MHTML_PATH" \
            $COOKIE_ARG

          if [ -f /tmp/mhtml_cookies.txt ]; then
            shred -u /tmp/mhtml_cookies.txt
          fi

          echo "filepath=$MHTML_PATH" >> $GITHUB_OUTPUT
          echo "basename=$BASE_NAME" >> $GITHUB_OUTPUT

      - name: Encrypt and save
        env:
          ENCRYPT_PASS: ${{ secrets.ENCRYPT_PASSWORD }}
          INPUT_FOLDER: ${{ github.event.inputs.output_folder }}
          FILEPATH: ${{ steps.download.outputs.filepath }}
        shell: bash
        run: |
          if [ -z "$ENCRYPT_PASS" ]; then
            echo "ERROR: ENCRYPT_PASSWORD secret is not set"
            exit 1
          fi

          sudo apt-get install -y p7zip-full -qq

          mkdir -p "$INPUT_FOLDER"

          RAND_NAME=$(openssl rand -hex 16)
          ARCHIVE="$INPUT_FOLDER/${RAND_NAME}.7z"

          # -mhe=on encrypts headers too — filename inside archive is hidden without password
          7z a -p"$ENCRYPT_PASS" -mhe=on -mx=3 "$ARCHIVE" "$FILEPATH"

          shred -u "$FILEPATH"
          rm -rf /tmp/mhtml_work
          ls -lh "$INPUT_FOLDER/"

      - name: Commit and push
        env:
          INPUT_FOLDER: ${{ github.event.inputs.output_folder }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$INPUT_FOLDER/"
          git commit -m "Update" || echo "Nothing to commit"
          git push
